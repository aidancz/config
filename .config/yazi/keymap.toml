# https://yazi-rs.github.io/docs/configuration/keymap

[mgr]
keymap = [
	# basic
	{ on = "<f1>",             run = "close" },
	{ on = [ "<f2>", "<f1>" ], run = "quit" },
	{ on = "<esc>",            run = ["escape", "unyank"] },
	{ on = "<f3>",             run = "help" },
	# { on = "<c-t>",            run = "tab_create --current" },
	{ on = [ "<space>", "t" ], run = "tasks:show" },

	# navigation
	{ on = "j", run = "arrow 1" },
	{ on = "k", run = "arrow -1" },
	{ on = "l", run = "enter" },
	{ on = "h", run = "leave" },

	{ on = "f", run = "arrow 100%" },
	{ on = "d", run = "arrow -100%" },
	{ on = "g", run = "arrow bot" },
	{ on = "s", run = "arrow top" },

	{ on = "<c-f>", run = "arrow 50%" },
	{ on = "<c-d>", run = "arrow -50%" },
	{ on = "<c-g>", run = "plugin list-seek 1" },
	{ on = "<c-s>", run = "plugin list-seek -1" },
	{ on = "<c-j>", run = "seek 10" },
	{ on = "<c-k>", run = "seek -10" },

	{ on = ")", run = "plugin parent-arrow 1" },
	{ on = "(", run = "plugin parent-arrow -1" },
	{ on = ">", run = "forward" },
	{ on = "<", run = "back" },

	{ on = "/", run = "find --smart" },
	{ on = "?", run = "find --previous --smart" },
	{ on = "n", run = "find_arrow" },
	{ on = "b", run = "find_arrow --previous" },

	{ on = "w", run = "plugin zoxide" },
	{ on = "e", run = "plugin fzf" },

	{ on = [ "<space>", "~" ], run = "cd ~" },
	{ on = [ "<space>", "s" ], run = """ shell -- ya emit cd "$(git rev-parse --show-toplevel)" """ },
	{ on = "<c-enter>", run = "follow" },

	# inspect
	{ on = [ "<space>", "i" ], run = "spot" },

	{ on = [ "<space>", "l", "s" ], run = "linemode size" },
	{ on = [ "<space>", "l", "p" ], run = "linemode permissions" },
	{ on = [ "<space>", "l", "b" ], run = "linemode btime" },
	{ on = [ "<space>", "l", "m" ], run = "linemode mtime" },
	{ on = [ "<space>", "l", "o" ], run = "linemode owner" },
	{ on = [ "<space>", "l", "n" ], run = "linemode none" },

	# sort

	{ on = [ "<space>", "g", "m" ], run = [ "sort mtime --reverse=no", "linemode mtime" ] },
	{ on = [ "<space>", "g", "M" ], run = [ "sort mtime --reverse", "linemode mtime" ] },
	{ on = [ "<space>", "g", "b" ], run = [ "sort btime --reverse=no", "linemode btime" ] },
	{ on = [ "<space>", "g", "B" ], run = [ "sort btime --reverse", "linemode btime" ] },
	{ on = [ "<space>", "g", "e" ], run = "sort extension --reverse=no" },
	{ on = [ "<space>", "g", "E" ], run = "sort extension --reverse" },
	{ on = [ "<space>", "g", "a" ], run = "sort alphabetical --reverse=no" },
	{ on = [ "<space>", "g", "A" ], run = "sort alphabetical --reverse" },
	{ on = [ "<space>", "g", "n" ], run = "sort natural --reverse=no" },
	{ on = [ "<space>", "g", "N" ], run = "sort natural --reverse" },
	{ on = [ "<space>", "g", "s" ], run = [ "sort size --reverse=no", "linemode size" ] },
	{ on = [ "<space>", "g", "S" ], run = [ "sort size --reverse", "linemode size" ] },
	{ on = [ "<space>", "g", "r" ], run = "sort random --reverse=no" },

	# filter
	{ on = ".",                run = "hidden toggle" },
	{ on = [ "<space>", "f" ], run = "filter --smart" },
	{ on = [ "<space>", "w" ], run = "search --via=fd" },
	{ on = [ "<space>", "r" ], run = "search --via=rg" },

	# select
	{ on = "<tab>", run = [ "toggle", "arrow 1" ] },
	{ on = "<s-tab>", run = [ "toggle", "arrow -1" ] },
	{ on = "<c-x>",  run = "toggle_all --state=on" },
	{ on = "<c-t>",  run = "toggle_all" },

	# coreutils
	{ on = "a",           run = "create" },
	{ on = "A",           run = "create --dir" },
	{ on = "<delete>",    run = "remove" },
	{ on = "<s-delete>",  run = "remove --permanently" },
	{ on = "i",           run = "rename --cursor=before_ext" },
	{ on = "y",           run = "yank" },
	{ on = "<backspace>", run = "yank --cut" },
	{ on = "p",           run = "paste" },
	{ on = "-",           run = "link" },
	{ on = "_",           run = "link --relative" },
	{ on = "<c-->",       run = "hardlink" },

	# use path
	{ on = [ "<space>", "<enter>" ], run = """ shell --block -- pick-yazi %h %s """ },
	{ on = "<enter>",                run = """ shell -- setsid -f $TERMINAL >/dev/null 2>&1 """ },
	{ on = "t",                      run = """ shell --block -- tig status """ },
	{ on = "o",                      run = "open" },
	{ on = "v",                      run = """ shell --block -- nvim %s """ },
	{ on = [ "<space>", "d" ],       run = "plugin diff" },
	{ on = [ "<space>", "o" ],       run = """ shell -- open-with-program %s """ },
	{ on = [ "<space>", "y", "s" ],  run = "copy dirname" },
	{ on = [ "<space>", "y", "g" ],  run = "copy filename" },
	{ on = [ "<space>", "y", "." ],  run = "copy path" },
]

[input]
prepend_keymap = [
	{ on = "<esc>", run = "close" },
]
